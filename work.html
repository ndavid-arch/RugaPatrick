<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ruganintwali Patrick</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E%F0%9F%8E%A8%3C/text%3E%3C/svg%3E" />
  <meta name="description" content="Browse Ruganintwali Patrick's work collection, including sculpture, painting, and settings." />
  <meta property="og:title" content="Work — Ruganintwali Patrick" />
  <meta property="og:description" content="Explore the work catalogue of Ruganintwali Patrick." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <!-- 3D model viewer (Google web component) -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
</head>
<body class="page-work">

  <!-- LOADER -->
  <div id="loader">
    <div id="loader-patterns"></div>
    <div id="loader-center">
      <div class="loader-name-wrap">
        <div class="loader-name-mask">
          <span class="loader-name">Work</span>
        </div>
        <span class="loader-underline"></span>
      </div>
    </div>
  </div>

  <div id="bg-patterns" aria-hidden="true"></div>

  <!-- NAV (shared from index.html) -->
  <div id="shared-nav"></div>

  <!-- PAGE HERO -->
  <section id="page-hero">
    <div class="page-hero-inner">
      <p class="slide-eyebrow">Catalogue</p>
      <h1>The<br/><em>Work</em></h1>
      <p class="page-hero-sub">

      </p>
    </div>
    <div class="page-hero-pattern" aria-hidden="true"></div>
  </section>

  <!-- WORK GRID -->
  <section id="work-catalogue">
    <div class="section-inner">
      <div class="work-grid">

        <!-- ─── 3D-equipped pieces ───
             data-images: JSON array of photos (gallery slider in the modal).
             data-model: .glb file shown when "View in 3D" toggle is clicked. -->

        <article class="wcard" data-category="contemporary" data-status="available"
          data-title=""
          data-year="2026"
          data-medium="Carved wood"
          data-dims=""
          data-price=""
          data-desc=""
          data-images='["WhatsApp Image 11.jpeg"]'
          data-model="Yugi-Duri.glb">
          <div class="wcard-img">
            <img src="WhatsApp Image 11.jpeg" alt="Yugi Duri" onerror="this.parentElement.classList.add('img-placeholder');this.style.display='none'"/>
            <div class="img-placeholder-label"></div>
            <div class="wcard-overlay"><span>Open</span></div>
            <div class="wcard-status available">3D · Available</div>
          </div>
          <div class="wcard-info">
            <h3></h3>
            <p class="wcard-meta">2026 · Contemporary · Photo + 3D</p>
            <p class="wcard-excerpt"></p>
            <span class="wcard-price"></span>
          </div>
        </article>

        <article class="wcard" data-category="contemporary" data-status="available"
          data-title=""
          data-year="2026"
          data-medium="Carved wood"
          data-dims=""
          data-price=""
          data-desc=""
          data-images='["WhatsApp Image 2026-04-16 at 05.jpeg"]'
          data-model="Yugi-Chest.glb">
          <div class="wcard-img">
            <img src="WhatsApp Image 2026-04-16 at 05.jpeg" alt="Yugi Chest" onerror="this.parentElement.classList.add('img-placeholder');this.style.display='none'"/>
            <div class="img-placeholder-label"></div>
            <div class="wcard-overlay"><span>Open</span></div>
            <div class="wcard-status available">3D · Available</div>
          </div>
          <div class="wcard-info">
            <h3></h3>
            <p class="wcard-meta">2026 · Contemporary · Photo + 3D</p>
            <p class="wcard-excerpt"></p>
            <span class="wcard-price"></span>
          </div>
        </article>

        <article class="wcard" data-category="contemporary" data-status="available"
          data-title=""
          data-year="2026"
          data-medium="Carved wood"
          data-dims=""
          data-price=""
          data-desc=""
          data-images='["WhatsApp Image .jpeg"]'
          data-model="Chest Plate.glb">
          <div class="wcard-img">
            <img src="WhatsApp Image .jpeg" alt="Chest Plate" onerror="this.parentElement.classList.add('img-placeholder');this.style.display='none'"/>
            <div class="img-placeholder-label"></div>
            <div class="wcard-overlay"><span>Open</span></div>
            <div class="wcard-status available">3D · Available</div>
          </div>
          <div class="wcard-info">
            <h3></h3>
            <p class="wcard-meta">2026 · Contemporary · Photo + 3D</p>
            <p class="wcard-excerpt"></p>
            <span class="wcard-price"></span>
          </div>
        </article>

        <!-- Each card has data attributes used by the modal -->

        <article class="wcard" data-category="traditional" data-status="available"
          data-title=""
          data-year="2026"
          data-medium="Carved wood"
          data-dims=""
          data-price=""
          data-desc=""
          data-img="assets/sculpture/sculpture-3.jpeg">
          <div class="wcard-img">
            <img src="assets/sculpture/sculpture-3.jpeg" alt="Isoko y'Ubuzima" loading="lazy" decoding="async" onerror="this.parentElement.classList.add('img-placeholder');this.style.display='none'"/>
            <div class="img-placeholder-label"></div>
            <div class="wcard-overlay"><span>View &amp; Buy</span></div>
          </div>
          <div class="wcard-info">
            <h3></h3>
            <p class="wcard-meta">2026 · Contemporary</p>
            <p class="wcard-excerpt"></p>
          </div>
        </article>

        <article class="wcard" data-category="traditional" data-status="available"
          data-title=""
          data-year="2026"
          data-medium="Carved wood"
          data-dims=""
          data-price=""
          data-desc=""
          data-img="assets/sculpture/sculpture-4.jpeg">
          <div class="wcard-img">
            <img src="assets/sculpture/sculpture-4.jpeg" alt="Urukundo" loading="lazy" decoding="async" onerror="this.parentElement.classList.add('img-placeholder');this.style.display='none'"/>
            <div class="img-placeholder-label"></div>
            <div class="wcard-overlay"><span>View &amp; Buy</span></div>
          </div>
          <div class="wcard-info">
            <h3></h3>
            <p class="wcard-meta">2026 · Contemporary</p>
            <p class="wcard-excerpt"></p>
          </div>
        </article>

        <article class="wcard" data-category="traditional" data-status="sold"
          data-title=""
          data-year="2026"
          data-medium="Carved wood"
          data-dims=""
          data-price="Sold"
          data-desc=""
          data-img="assets/sculpture/sculpture-5.jpeg">
          <div class="wcard-img">
            <img src="assets/sculpture/sculpture-5.jpeg" alt="Impano" loading="lazy" decoding="async" onerror="this.parentElement.classList.add('img-placeholder');this.style.display='none'"/>
            <div class="img-placeholder-label"></div>
            <div class="wcard-overlay"><span>View</span></div>
          </div>
          <div class="wcard-info">
            <h3></h3>
            <p class="wcard-meta">2026 · Contemporary</p>
            <p class="wcard-excerpt"></p>
          </div>
        </article>

      </div><!-- .work-grid -->
    </div>
  </section>

  <!-- PIECE MODAL -->
  <div id="piece-modal" class="piece-modal" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-panel">
      <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>
      <div class="modal-body">
        <div class="modal-img-side">
          <img id="modal-img" src="" alt="" />
          <div class="modal-img-placeholder"></div>
          <!-- Gallery navigation (hidden by default, JS shows when >1 image) -->
          <button class="modal-gallery-arrow prev" id="modalPrev" aria-label="Previous photo" hidden>‹</button>
          <button class="modal-gallery-arrow next" id="modalNext" aria-label="Next photo" hidden>›</button>
          <div class="modal-gallery-counter" id="modalCounter" hidden></div>
        </div>
        <div class="modal-info-side">
          <p class="slide-eyebrow" id="modal-meta"></p>
          <h2 id="modal-title"></h2>
          <p class="modal-dims" id="modal-dims"></p>
          <p class="modal-desc" id="modal-desc"></p>
          <div class="modal-footer">
            <div class="modal-actions" id="modal-actions"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- FOOTER (shared from index.html) -->
  <div id="shared-footer"></div>

  <script src="script.js"></script>
</body>
</html>
