name: CI / Deploy to GitHub Pages

# Runs on every push to main, and on every pull request targeting main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Allow only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ─── JOB 1: CI — Validate the project ───────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check all required files exist
        run: |
          echo "── Checking required files ──"
          MISSING=0
          for f in index.html exhibition.html work.html contact.html styles.css script.js; do
            if [ -f "$f" ]; then
              echo "  ✓  $f"
            else
              echo "  ✗  $f  ← MISSING"
              MISSING=1
            fi
          done
          if [ $MISSING -eq 1 ]; then
            echo ""
            echo "One or more required files are missing. Fix before deploying."
            exit 1
          fi
          echo ""
          echo "All files present."

      - name: Check HTML files are non-empty
        run: |
          echo "── Checking HTML is not empty ──"
          for f in index.html exhibition.html work.html contact.html; do
            LINES=$(wc -l < "$f")
            echo "  $f → $LINES lines"
            if [ "$LINES" -lt 10 ]; then
              echo "  ✗  $f looks too small — may be corrupt"
              exit 1
            fi
          done
          echo "All HTML files look healthy."

      - name: Check for console.log leftovers (warning only)
        run: |
          echo "── Scanning for console.log ──"
          if grep -rn "console\.log" script.js; then
            echo "  ⚠  Found console.log calls — remove before production"
          else
            echo "  ✓  No console.log found"
          fi

  # ─── JOB 2: CD — Deploy to GitHub Pages ─────────────────────────────────────
  deploy:
    name: Deploy
    needs: validate                   # only deploy if validate passes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'   # only deploy on pushes to main (not PRs)

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload site files
        uses: actions/upload-pages-artifact@v3
        with:
          path: .          # root of the repo = your site files

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
